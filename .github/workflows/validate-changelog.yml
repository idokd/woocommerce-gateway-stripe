name: 'Validate Changelog'

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - trunk
      - develop

jobs:
  check_changelog:
    name: 'Check for changelog updates'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR description for changelog exemption
        id: check_exemption
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            
            const exemptionPattern = /- *\[x\] *This Pull Request does not require a changelog entry/i;
            const isExempt = exemptionPattern.test(prBody);
            
            core.setOutput('is_exempt', isExempt.toString());

      - name: Check for changelog updates
        id: has_changelog_entries
        if: steps.check_exemption.outputs.is_exempt != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const changelogUpdated = files.some(file => file.filename === 'changelog.txt');
            const readmeUpdated = files.some(file => file.filename === 'readme.txt');
            
            if (!changelogUpdated || !readmeUpdated) {
              core.setFailed(
                'This PR requires changelog entries. Please run `npm run changelog` to add entries to both changelog.txt and readme.txt, ' +
                'or check "This Pull Request does not require a changelog entry" in the PR description if no changelog is needed.'
              );
            } else {
              console.log('Changelog entries found in both files ✅');

              const prDetails = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });

              const prSha = prDetails?.data?.head?.sha ?? '';
              const prBranch = prDetails?.data?.head?.ref ?? '';
              const targetSha = prDetails?.data?.base?.sha ?? '';
              const targetBranch = prDetails?.data?.base?.ref ?? '';

              if ( prSha !== '' && prBranch !== '' && targetSha !== '' && targetBranch !== '' ) {
                core.setOutput( 'pr_sha', prSha );
                core.setOutput( 'pr_branch', prBranch );
                core.setOutput( 'target_sha', targetSha );
                core.setOutput( 'target_branch', targetBranch );
              }
            }

      - name: Get changelog diff
        id: get_changelog_diff
        if: steps.has_changelog_entries.outputs.target_branch != ''
        shell: bash
        env:
          TARGET_BRANCH: ${{ steps.has_changelog_entries.outputs.target_branch }}
          TARGET_SHA: ${{ steps.has_changelog_entries.outputs.target_sha }}
          PR_SHA: ${{ steps.has_changelog_entries.outputs.pr_sha }}
          PR_BRANCH: ${{ steps.has_changelog_entries.outputs.pr_branch }}
        run: |
          # Ensure we have the target branch available for diffs
          echo "Fetching target branch: ${TARGET_BRANCH}"
          git fetch --no-tags --prune --depth=1 origin +refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}
          # Ensure we have the PR branch available for diffs
          echo "Fetching PR branch: ${PR_BRANCH}"
          git fetch --no-tags --prune --depth=1 origin +refs/heads/${PR_BRANCH}:refs/remotes/origin/${PR_BRANCH}
          # Get minimal diff to changelog.txt
          echo "Getting minimal diff for changelog.txt; SHAs are ${TARGET_SHA} and ${PR_SHA}"
          echo 'changelog-diff<<EOF' >> $GITHUB_OUTPUT
          git diff --patch --unified=1 ${TARGET_SHA} ${PR_SHA} -- changelog.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Check for changelog entries with trailing periods
        if: steps.get_changelog_diff.outputs.changelog-diff != ''
        shell: bash
        env:
          CHANGELOG_DIFF: ${{ steps.get_changelog_diff.outputs.changelog-diff }}
        run: |
          NEWLINE=$'\n'
          TRAILING_PERIOD_REGEX="${NEWLINE}\+\*[^${NEWLINE}]*\.[:space:]*${NEWLINE}"
          if [[ "$CHANGELOG_DIFF" =~ $TRAILING_PERIOD_REGEX ]]; then
            echo "Changelog entries with trailing periods found:"
            echo "$CHANGELOG_DIFF"
            exit 1
          fi
          echo "No changelog entries with trailing periods found ✅"
          exit 0
