name: 'Generate changelog'

on:
  pull_request:
    types: [edited]
    branches:
      - trunk
      - develop

permissions: {}

jobs:
  generate_changelog:
    name: 'Generates a changelog entry'
    runs-on: ubuntu-20.04
    permissions:
      pull-requests: write
    steps:
      - name: 'Collect changelog data from PR description'
        run: |
          DO_NOT_REQUIRE_CHANGELOG=$(grep -E -o '.{0,3} This Pull Request does not require a changelog entry' <<< "${{ github.event.pull_request.description }}" | awk '{print substr($0,2,1)}')
          if [[ $DO_NOT_REQUIRE_CHANGELOG == 'x' ]]; then
          echo "This PR does not require a changelog entry. Exiting."
          exit 0
          fi
          
          declare -A TYPES=( ["Fix"]="Fix" ["Add"]="Add" ["Update"]="Update" ["Dev"]="Dev" ["Tweak"]="Tweak" )
          for TYPE in "${!TYPES[@]}"; do
          if [[ $(grep -E -o ".{0,3} $TYPE - " <<< "${{ github.event.pull_request.description }}" | awk '{print substr($0,2,1)}') == 'x' ]]; then
          CHANGELOG_TYPE=${TYPES[$TYPE]}
          break
          fi
          done
          
          if [[ -z $CHANGELOG_TYPE ]]; then
          echo "This PR does not have a valid changelog entry. Exiting."
          exit 0
          fi
          
          CHANGELOG_CONTENT=$(grep -wns '#### Message <!-- Add a changelog message here -->' <<< "${{ github.event.pull_request.description }}" -A2 | tail -1 | awk '{print substr($0,index($0," - ")+4)}')
          if [[ $CHANGELOG_CONTENT == '</details>' ]]; then
          echo "This PR does not contain a changelog entry. Exiting."
          exit 0
          fi
          
          CHANGELOG_ENTRY="* $CHANGELOG_TYPE - $CHANGELOG_CONTENT"
          echo "CHANGELOG_ENTRY=$CHANGELOG_ENTRY" >> $GITHUB_OUTPUT
        id: collect_changelog_data
        
      - name: 'Add changelog entry to changelog.txt'
        uses: ./.github/actions/add-changelog-entry
        with:
          CHANGELOG_ENTRY: ${{ steps.collect_changelog_data.outputs.CHANGELOG_ENTRY }}
          FILENAME: './changelog.txt'
          
      - name: 'Add changelog entry to readme.txt'
        uses: ./.github/actions/add-changelog-entry
        with:
          CHANGELOG_ENTRY: ${{ steps.collect_changelog_data.outputs.CHANGELOG_ENTRY }}
          FILENAME: './readme.txt'
          
      - name: 'Commit changes'
        run: |
            git config user.name "bot-wc-stripe"
            git config user.email "bot-wc-stripe@users.noreply.github.com"
            git add changelog.txt
            git add readme.txt
            git commit -m "Add changelog entry for PR ${{ github.event.pull_request.number }}"
            git push
        id: commit_changes
        