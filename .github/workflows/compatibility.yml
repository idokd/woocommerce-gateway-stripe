name: PHP tests

on:
  pull_request

jobs:
  beta-compatibility:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        woocommerce: [ 'beta' ]
        wordpress:   [ 'latest' ]
        php:         [ '7.4', '8.0', '8.1' ]
        exclude: # incompatible versions of PHP, WordPress, and WooCommerce
          - woocommerce: 'beta'
            wordpress: 'latest'
            php: '8.1'

    name: Beta (PHP=${{ matrix.php }}, WP=${{ matrix.wordpress }}, WC=${{ matrix.woocommerce }})
    env:
      PHP_VERSION: ${{ matrix.php }}
      WP_VERSION:  ${{ matrix.wordpress }}
      WC_VERSION:  ${{ matrix.woocommerce }}
    steps:
      - name: Testing with PHP=${{ matrix.php }}, WP=${{ matrix.wordpress }}, WC=${{ matrix.woocommerce }}
        uses: actions/checkout@v2

      - name: Set up dependencies caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/
          key:  ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Set up PHP
        uses: shivammathur/setup-php@0f7f1d08e3e32076e51cae65eb0b0c871405b16e # v2.34.1
        with:
          php-version: ${{ matrix.php }}
          coverage:    none

      - name: Run CI checks
        run: bash bin/run-ci-tests.bash
