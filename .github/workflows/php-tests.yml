name: PHP tests

on:
  pull_request

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast:    false
      max-parallel: 16
      matrix:
        woocommerce_support_policy: [ 'L', 'L-1', 'L-2' ]
        wordpress_support_policy:   [ 'L', 'L-1', 'L-2' ]
        php_support_policy:         [ 'L', 'L-1', 'L-2', 'L-3', '7.4' ]
        include:
          # WooCommerce
          - woocommerce_support_policy: L
            woocommerce: '9.8.1'
          - woocommerce_support_policy: L-1
            woocommerce: '9.7.1'
          - woocommerce_support_policy: L-2
            woocommerce: '9.6.2'
          # WordPress
          - wordpress_support_policy: L
            wordpress: '6.7.2'
          - wordpress_support_policy: L-1
            wordpress: '6.6.2'
          # WooCommerce 9.5.0+ requires WordPress 6.6+
          # (we'll keep two versions from the 6.6 branch until Apr when WP 6.8 is released)
          - wordpress_support_policy: L-2
            wordpress: '6.6'
          # PHP
          - php_support_policy: L
            php: '8.3'
          - php_support_policy: L-1
            php: '8.2'
          - php_support_policy: L-2
            php: '8.1'
          - php_support_policy: L-3
            php: '8.0'
          - php_support_policy: '7.4'
            php: '7.4'
        exclude: # incompatible versions of PHP, WordPress, and WooCommerce
          - woocommerce_support_policy: L
            wordpress_support_policy: L-2

    name: Stable (PHP=${{ matrix.php_support_policy }}, WP=${{ matrix.wordpress_support_policy }}, WC=${{ matrix.woocommerce_support_policy }})
    env:
      PHP_VERSION: ${{ matrix.php }} 
      WP_VERSION:  ${{ matrix.wordpress }}
      WC_VERSION:  ${{ matrix.woocommerce }}
    steps:
      - name: Testing with PHP=${{ matrix.php }}, WP=${{ matrix.wordpress }}, WC=${{ matrix.woocommerce }}
        uses: actions/checkout@v2

      - name: Set up dependencies caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/
          key:  ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage:    xdebug

      - name: Run CI checks
        run: bash bin/run-ci-tests.bash
        