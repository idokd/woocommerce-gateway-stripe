name: PHP tests

on:
  pull_request

jobs:
  get-woocommerce-versions:
    runs-on: ubuntu-22.04
    outputs:
        woocommerce-versions-json: ${{ steps.get-released-woocommerce-versions.outputs.versions-json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get WooCommerce plugin versions
        id: get-released-woocommerce-versions
        uses: ./.github/actions/get-wordpress-plugin-versions
        with:
          plugin-slug: woocommerce
          version-count: 3
  get-wordpress-versions:
    runs-on: ubuntu-22.04
    outputs:
      wordpress-versions-json: ${{ steps.get-wordpress-versions.outputs.versions-json }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get WordPress versions
        id: get-wordpress-versions
        uses: ./.github/actions/get-wordpress-versions
        with:
          version-count: 3

  test:
    runs-on: ubuntu-22.04
    needs: [ get-woocommerce-versions, get-wordpress-versions ]
    strategy:
      fail-fast:    false
      max-parallel: 16
      # Try to keep basic matrix small to stay within our runner quota.
      # The current matrix includes 12 combos (2 WC × 2 WP × 3 PHP),
      # with coverage of PHP 7.4, 8.2, and 8.5.
      matrix:
        woocommerce_support_policy: [ 'L', 'L-2' ]
        wordpress_support_policy:   [ 'L', 'L-2' ]
        php:                        [ '7.4', '8.2', '8.5' ]
        include:
          # WooCommerce
          - woocommerce_support_policy: L
            woocommerce: ${{ fromJson(needs.get-woocommerce-versions.outputs.woocommerce-versions-json)[0] }}
          - woocommerce_support_policy: L-2
            woocommerce: ${{ fromJson(needs.get-woocommerce-versions.outputs.woocommerce-versions-json)[2] }}
          # WordPress
          - wordpress_support_policy: L
            wordpress: ${{ fromJson(needs.get-wordpress-versions.outputs.wordpress-versions-json)[0] }}
          - wordpress_support_policy: L-2
            wordpress: ${{ fromJson(needs.get-wordpress-versions.outputs.wordpress-versions-json)[2] }}

    name: Stable (PHP=${{ matrix.php }}, WP=${{ matrix.wordpress_support_policy }}, WC=${{ matrix.woocommerce_support_policy }})
    env:
      PHP_VERSION: ${{ matrix.php }} 
      WP_VERSION:  ${{ matrix.wordpress }}
      WC_VERSION:  ${{ matrix.woocommerce }}
    steps:
      - name: Testing with PHP=${{ matrix.php }}, WP=${{ matrix.wordpress }}, WC=${{ matrix.woocommerce }}
        uses: actions/checkout@v2

      - name: Set up dependencies caching
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/
          key:  ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Cache WordPress core and test suite
        uses: actions/cache@v4
        with:
          path: |
            /tmp/wordpress
            /tmp/wordpress-tests-lib
          key: wp-testenv-${{ runner.os }}-${{ matrix.wordpress }}-wc-${{ matrix.woocommerce }}-${{ hashFiles('bin/install-wp-tests.sh', 'bin/run-ci-tests.bash') }}
          restore-keys: |
            wp-testenv-${{ runner.os }}-${{ matrix.wordpress }}-wc-${{ matrix.woocommerce }}-
            wp-testenv-${{ runner.os }}-${{ matrix.wordpress }}-
            wp-testenv-${{ runner.os }}-

      - name: Set up PHP
        uses: shivammathur/setup-php@0f7f1d08e3e32076e51cae65eb0b0c871405b16e # v2.34.1
        with:
          php-version: ${{ matrix.php }}
          coverage:    xdebug

      - name: Run CI checks
        run: bash bin/run-ci-tests.bash
        