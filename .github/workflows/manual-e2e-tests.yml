
name: Manual E2E tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch, Tag or SHA to checkout. Leave empty to use the same commit/branch as the workflow branch.
        type: string
      wordpress-version:
        description: WordPress version number. Defaults to 'latest' (the latest version).
        type: string
        default: 'latest'
        required: true
      woocommerce-version:
        description: WooCommerce version number. Defaults to 'latest' (the latest version).
        type: string
        default: 'latest'
        required: true
      php-version:
        type: choice
        default: '7.4'
        required: true
        options:
          - '7.4'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

jobs:
  test:
    name: Run e2e tests
    uses: ./.github/workflows/run-e2e-tests.yml
    secrets: inherit
    with:
      wp-version: ${{ inputs.wordpress-version }}
      wc-version: ${{ inputs.woocommerce-version }}
      php-version: ${{ inputs.php-version }}
      branch: ${{ inputs.branch }}
