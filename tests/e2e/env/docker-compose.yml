volumes:
  # Kludge for not having the ./docker directory bound recursively
  dockerdirectory:

services:
  stripe:
    container_name: wcstripe-e2e-stripe-listener
    image: stripe/stripe-cli
    restart: unless-stopped
    depends_on:
      - wordpress
    command: "listen --api-key=${STRIPE_SECRET_KEY} --forward-to http://wordpress/?wc-api=wc_stripe"
  wordpress:
    build: .
    image: wordpress
    container_name: wcstripe-e2e-wordpress
    depends_on:
      - db
    links:
      - db:mysql
    ports:
      - "8088:80"
    env_file:
      - default.env
    environment:
      - E2E_TESTING=true
    volumes:
      - ./docker/wordpress:/var/www/html/
      - ./docker/logs/apache2/:/var/log/apache2
      - ${CWD}:/var/www/html/wp-content/plugins/woocommerce-gateway-stripe
      - dockerdirectory:/var/www/html/wp-content/plugins/woocommerce-gateway-stripe/tests/e2e/env/docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
  db:
    container_name: wcstripe-e2e-mysql
    image: mariadb:latest
    ports:
      - "6789:3306"
    env_file:
      - default.env
    volumes:
      - ./docker/data:/var/lib/mysql
